<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Pro - Seguimiento de Cámara</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // COMPONENTE PARA ARRASTRAR OBJETOS
        AFRAME.registerComponent('drag-relative', {
            init: function () {
                this.isDragging = false;
                this.el.addEventListener('mousedown', () => { 
                    this.isDragging = true; 
                    this.el.setAttribute('scale', '1.1 1.1 1.1'); // Feedback visual
                });
                window.addEventListener('mouseup', () => { 
                    this.isDragging = false; 
                    this.el.setAttribute('scale', this.el.dataset.originalScale || '1 1 1');
                });
            },
            tick: function () {
                if (this.isDragging) {
                    // El objeto sigue al puntero sobre el plano del suelo
                    const mesh = document.getElementById('floor');
                    const raycaster = this.el.sceneEl.components.raycaster;
                    const intersections = raycaster.getIntersections(mesh);
                    if (intersections.length > 0) {
                        const p = intersections[0].point;
                        this.el.setAttribute('position', {x: p.x, y: 0.1, z: p.z});
                    }
                }
            }
        });
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-panel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; }
        .btn { background: #1e293b; color: white; padding: 12px 20px; border-radius: 8px; border: 2px solid #3b82f6; cursor: pointer; font-weight: bold; }
        .menu { position: fixed; bottom: 85px; left: 20px; width: 350px; height: 500px; background: rgba(15,23,42,0.98); border: 2px solid #3b82f6; display: none; flex-direction: column; z-index: 1001; border-radius: 15px; padding: 15px; }
        .scroll-v { overflow-y: auto; flex-grow: 1; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button class="btn" onclick="toggleMenu()">📂 BIBLIOTECA</button>
    </div>

    <div id="menu" class="menu">
        <div class="text-white font-bold border-b border-gray-700 pb-2 text-xs uppercase">Assets</div>
        <div class="scroll-v">
            <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
        </div>
    </div>

    <a-scene raycaster="objects: .interactable, #floor" cursor="rayOrigin: mouse">
        <a-sky color="#050505"></a-sky>
        
        <a-plane id="floor" rotation="-90 0 0" width="200" height="200" visible="false"></a-plane>
        <a-grid opacity="0.2"></a-grid>

        <a-entity id="world-container"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="2 4 3"></a-light>

        <a-entity id="rig" movement-controls="fly: true; speed: 0.3">
            <a-entity id="camera" camera look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 100;"></a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Big Crystal.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Dead Tree.glb", "Flowers.glb", "Grass.glb", "Zombie.glb", "Steve.glb", "vagoneta.glb"];

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    if(m.style.display === 'flex') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 text-center text-[10px]";
        d.innerHTML = `📦<br>${name.split('.')[0]}`;
        d.onclick = (e) => { e.stopPropagation(); spawn(name); };
        l.appendChild(d);
    });
}

function spawn(name) {
    const world = document.getElementById('world-container');
    const camera = document.getElementById('camera');
    
    // OBTENER POSICIÓN Y DIRECCIÓN DE LA CÁMARA
    const position = new THREE.Vector3();
    const direction = new THREE.Vector3();
    
    camera.object3D.getWorldPosition(position);
    camera.object3D.getWorldDirection(direction);
    
    // Calcular punto 2 metros delante de la cámara
    // En A-Frame la dirección forward es el eje -Z, por eso usamos el negativo
    const spawnPos = {
        x: position.x - (direction.x * 2),
        y: position.y - (direction.y * 2) - 0.5, // Un poco más bajo que los ojos
        z: position.z - (direction.z * 2)
    };
    
    const entity = document.createElement('a-entity');
    entity.setAttribute('position', spawnPos);
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    entity.setAttribute('drag-relative', ''); // ACTIVA EL MOVIMIENTO

    // Escala
    let scale = "1 1 1";
    if(name.toLowerCase().includes("flower") || name.toLowerCase().includes("grass")) scale = "0.2 0.2 0.2";
    entity.setAttribute('scale', scale);
    entity.dataset.originalScale = scale;

    world.appendChild(entity);
    toggleMenu();
}
</script>
</body>
</html>
