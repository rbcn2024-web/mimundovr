<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Rafael - Construcción Real</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div style="position: fixed; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; border-radius: 10px; z-index: 1000; font-family: sans-serif; border: 2px solid #ef4444;">
        <b style="color: #ef4444;">MODO EDICIÓN:</b><br>
        • Apuntar + Tecla <b>X</b>: Borrar objeto<br>
        • Los objetos aparecen frente a ti.
    </div>

    <div style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button onclick="toggleMenu()" style="background: #1e293b; color: white; padding: 12px; border: 2px solid #3b82f6; border-radius: 8px; cursor: pointer; font-weight: bold;">📦 ASSETS</button>
        <button onclick="descargarEscena()" style="background: #064e3b; color: #10b981; padding: 12px; border: 2px solid #10b981; border-radius: 8px; cursor: pointer; font-weight: bold;">💾 GUARDAR MUNDO</button>
    </div>

    <div id="menu" style="position: fixed; bottom: 85px; left: 20px; width: 320px; height: 450px; background: rgba(15, 23, 42, 0.98); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; border-radius: 15px;">
        <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene id="escena-principal">
        <a-sky color="#050505"></a-sky>
        <a-grid opacity="0.2"></a-grid>
        
        <a-entity id="contenedor-mundo"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="2 4 3"></a-light>

        <a-entity id="rig" position="0 0 5">
            <a-entity id="camera" camera look-controls wasd-controls="acceleration: 100">
                <a-cursor id="puntero" raycaster="objects: .interactable" color="#3b82f6"></a-cursor>
            </a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Flowers.glb", "Grass.glb", "Steve.glb", "Zombie.glb", "vagoneta.glb"];
let objetoApuntado = null;

// Detectar a qué objeto estamos mirando
document.getElementById('puntero').addEventListener('raycaster-intersection', function (evt) {
    objetoApuntado = evt.detail.els[0];
});
document.getElementById('puntero').addEventListener('raycaster-intersection-cleared', function () {
    objetoApuntado = null;
});

// Tecla X para borrar
window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'x' && objetoApuntado) {
        objetoApuntado.parentNode.removeChild(objetoApuntado);
        console.log("Objeto eliminado");
    }
});

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 text-center text-[10px] text-white border border-slate-700";
        d.innerHTML = `📦<br>${name}`;
        d.onclick = () => spawn(name);
        l.appendChild(d);
    });
}

function spawn(name) {
    const camera = document.getElementById('camera');
    const world = document.getElementById('contenedor-mundo');

    const entity = document.createElement('a-entity');
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    
    // Lo vinculamos un momento a la cámara para captar tu posición
    camera.appendChild(entity);
    entity.setAttribute('position', '0 -0.5 -3'); // 3 metros delante
    
    setTimeout(() => {
        // Capturamos la posición global real
        const pos = new THREE.Vector3();
        entity.object3D.getWorldPosition(pos);
        const rot = new THREE.Quaternion();
        entity.object3D.getWorldQuaternion(rot);
        
        // Lo movemos al contenedor del mundo
        world.appendChild(entity);
        entity.object3D.position.copy(pos);
        entity.object3D.quaternion.copy(rot);
        
        if(name.match(/flower|grass|bamboo/i)) entity.setAttribute('scale', '0.2 0.2 0.2');
    }, 20);

    toggleMenu();
}

function descargarEscena() {
    // Esta función crea un archivo HTML con todo lo que has construido
    const contenidoMundo = document.getElementById('contenedor-mundo').innerHTML;
    const plantilla = `<html><head><script src="https://aframe.io/releases/1.4.2/aframe.min.js"><\/script></head><body><a-scene><a-sky color="#050505"></a-sky><a-grid opacity="0.2"></a-grid>${contenidoMundo}</a-scene></body></html>`;
    
    const blob = new Blob([plantilla], {type: 'text/html'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'mi-metaverso-guardado.html';
    link.click();
}
</script>
</body>
</html>
