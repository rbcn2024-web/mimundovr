

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Rafael VR - FIX POSICIÓN</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin:0; overflow:hidden; background:#000;">

    <div style="position:fixed; bottom:20px; left:20px; z-index:1000; display:flex; gap:10px;">
        <button onclick="toggleMenu()" style="background:#1e293b; color:white; padding:12px; border:2px solid #3b82f6; border-radius:8px; cursor:pointer;">LIBRERÍA</button>
    </div>

    <div id="menu" style="position:fixed; bottom:85px; left:20px; width:300px; height:400px; background:rgba(15,23,42,0.95); border:2px solid #3b82f6; display:none; overflow-y:auto; padding:15px; z-index:1001; border-radius:15px;">
        <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene raycaster="objects: .interactable">
        <a-sky color="#050505"></a-sky>
        <a-grid opacity="0.2"></a-grid>
        
        <a-entity id="mundo"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="2 4 3"></a-light>

        <a-entity id="rig" position="0 0 5">
            <a-entity id="camera" camera look-controls wasd-controls="acceleration:100">
                <a-cursor color="#3b82f6" raycaster="objects: .interactable"></a-cursor>
            </a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Flowers.glb", "Grass.glb", "Steve.glb", "Zombie.glb", "vagoneta.glb"];

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 text-center text-[10px] text-white";
        d.innerHTML = `📦<br>${name}`;
        d.onclick = () => spawn(name);
        l.appendChild(d);
    });
}

function spawn(name) {
    const scene = document.querySelector('a-scene');
    const camera = document.getElementById('camera');
    const world = document.getElementById('mundo');

    // 1. Creamos el asset
    const entity = document.createElement('a-entity');
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    
    // 2. TRUCO DE POSICIÓN: Lo pegamos a la cámara un milisegundo
    // Esto hace que herede la posición exacta de donde estés
    camera.appendChild(entity);
    
    // Lo ponemos 2 metros delante de la cámara (posición relativa)
    entity.setAttribute('position', '0 -0.5 -2');
    
    // 3. Lo "soltamos" en el mundo para que se quede ahí fijo
    setTimeout(() => {
        const globalPos = entity.object3D.getWorldPosition(new THREE.Vector3());
        const globalRot = entity.object3D.getWorldQuaternion(new THREE.Quaternion());
        
        world.appendChild(entity); // Lo movemos al contenedor del mundo
        
        entity.object3D.position.copy(globalPos);
        entity.object3D.quaternion.copy(globalRot);
        
        // Ajuste de escala
        if(name.match(/flower|grass|bamboo/i)) {
            entity.setAttribute('scale', '0.2 0.2 0.2');
        } else {
            entity.setAttribute('scale', '1 1 1');
        }
    }, 10);

    // 4. SISTEMA DE SELECCIÓN/MOVIMIENTO SIMPLE:
    // Al hacer clic, el objeto se mueve 0.5m hacia arriba para confirmar que funciona
    entity.addEventListener('click', function() {
        let p = this.getAttribute('position');
        this.setAttribute('position', {x: p.x, y: p.y + 0.5, z: p.z});
        console.log("Clic detectado en " + name);
    });

    toggleMenu();
}
</script>
</body>
</html>
