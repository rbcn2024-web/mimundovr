<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Renoverso - Control Teclado Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // Componente para asegurar que el teclado siempre funcione
        AFRAME.registerComponent('keyboard-fix', {
            init: function () {
                window.addEventListener('keydown', (e) => {
                    if(e.code === 'Space') { // Truco: Pulsa espacio para "desbloquear" si te quedas quieto
                        console.log("Teclado activo");
                    }
                });
            }
        });

        // Componente de Selección (El Gizmo)
        AFRAME.registerComponent('selectable', {
            init: function () {
                this.el.addEventListener('click', (e) => {
                    // Limpiar selecciones previas
                    document.querySelectorAll('.interactable').forEach(el => {
                        if(el.querySelector('.gizmo')) el.removeChild(el.querySelector('.gizmo'));
                    });
                    
                    // Crear el Gizmo visual (Caja de transformación)
                    const gizmo = document.createElement('a-box');
                    gizmo.setAttribute('class', 'gizmo');
                    gizmo.setAttribute('wireframe', true);
                    gizmo.setAttribute('color', '#FFD700'); // Dorado para que se vea bien
                    gizmo.setAttribute('scale', '1.2 1.2 1.2');
                    this.el.appendChild(gizmo);
                    
                    console.log("Seleccionado: " + this.el.getAttribute('gltf-model'));
                });
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .ui-panel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { background: #1e293b; color: white; padding: 12px 20px; border-radius: 8px; border: 2px solid #3b82f6; cursor: pointer; font-weight: bold; }
        .menu { position: fixed; bottom: 85px; left: 20px; width: 320px; height: 450px; background: rgba(15, 23, 42, 0.95); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; border-radius: 15px; }
        .hint { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px; border-radius: 5px; font-size: 12px; z-index: 1000; border-left: 3px solid #00ff00; }
    </style>
</head>
<body>

    <div class="hint">
        <b>CONTROLES PC:</b><br>
        • MOVER: Flechas del teclado o WASD<br>
        • SELECCIONAR: Clic Izquierdo del Ratón<br>
        • VOLAR: Teclas Q (Arriba) / E (Abajo)
    </div>

    <div class="ui-panel">
        <button class="btn" onclick="toggleMenu()">📦 LIBRERÍA</button>
        <button class="btn" onclick="exportar()" style="border-color:#22c55e; color:#22c55e;">💾 GUARDAR</button>
    </div>

    <div id="menu" class="menu">
        <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene keyboard-fix raycaster="objects: .interactable" cursor="rayOrigin: mouse">
        
        <a-sky color="#0a0a0a"></a-sky>
        
        <a-grid position="0 0 0" cellColor="#444" sectionColor="#3b82f6" opacity="0.3"></a-grid>

        <a-entity id="world-container"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="2 5 3" intensity="0.8"></a-light>

        <a-entity id="rig" movement-controls="fly: true; speed: 0.3">
            <a-entity camera 
                      position="0 1.6 5" 
                      look-controls="pointerLockEnabled: false" 
                      wasd-controls="acceleration: 65; enabled: true">
            </a-entity>
        </a-entity>

    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Big Crystal.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Dead Tree.glb", "Flowers.glb", "Grass.glb", "Zombie.glb", "Steve.glb", "vagoneta.glb"];

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-3 rounded-lg cursor-pointer hover:bg-blue-600 border border-white/5 text-center text-[10px]";
        d.innerHTML = `📦<br>${name.split('.')[0]}`;
        d.onclick = (e) => { e.stopPropagation(); spawn(name); };
        l.appendChild(d);
    });
}

function spawn(name) {
    const w = document.getElementById('world-container');
    const entity = document.createElement('a-entity');
    
    // Lo ponemos un poco al frente para que lo veas al nacer
    entity.setAttribute('position', {x: (Math.random()-0.5)*2, y: 0, z: -2});
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    entity.setAttribute('selectable', ''); 

    // Ajuste de escala automático
    if(name.includes("Flowers") || name.includes("Grass")) {
        entity.setAttribute('scale', '0.2 0.2 0.2');
    } else {
        entity.setAttribute('scale', '1 1 1');
    }

    w.appendChild(entity);
    toggleMenu();
}

function exportar() {
    document.querySelector('a-scene').components['gltf-exporter'].export();
}
</script>
</body>
</html>
