<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mega Editor Rafael - Lista Completa</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div style="position: fixed; top: 20px; left: 20px; background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; border-radius: 10px; z-index: 1000; font-family: sans-serif; border: 2px solid #3b82f6; font-size: 11px;">
        <b style="color: #3b82f6;">CONTROLES:</b><br>
        • <b>WASD / Flechas</b>: Moverse por los cuadros.<br>
        • <b>Mirar + X</b>: Borrar objeto apuntado.<br>
        • <b>Q / E</b>: Subir / Bajar (Volar).
    </div>

    <div style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button onclick="toggleMenu()" style="background: #1e293b; color: white; padding: 12px; border: 2px solid #3b82f6; border-radius: 8px; cursor: pointer; font-weight: bold;">📦 ABRIR LIBRERÍA (+80)</button>
        <button onclick="descargarMundo()" style="background: #064e3b; color: #10b981; padding: 12px; border: 2px solid #10b981; border-radius: 8px; cursor: pointer; font-weight: bold;">💾 GUARDAR</button>
    </div>

    <div id="menu" style="position: fixed; bottom: 85px; left: 20px; width: 350px; height: 550px; background: rgba(15, 23, 42, 0.98); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; border-radius: 15px;">
        <div class="text-blue-400 font-bold mb-3 text-xs uppercase border-b border-blue-900 pb-2">Catálogo mi-metaverso2</div>
        <div id="list" class="grid grid-cols-2 gap-2"></div>
    </div>

    <a-scene id="escena" shadow="type: pcfsoft">
        <a-sky color="#050505"></a-sky>
        
        <a-grid position="0 0 0" rotation="-90 0 0" width="1000" height="1000" cellColor="#222" sectionColor="#3b82f6" opacity="0.5"></a-grid>
        
        <a-entity id="contenedor-mundo"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="5 10 5" intensity="0.8"></a-light>

        <a-entity id="rig" position="0 0 5">
            <a-entity id="camera" camera look-controls wasd-controls="acceleration: 100">
                <a-cursor id="puntero" raycaster="objects: .interactable" color="#00ff00"></a-cursor>
            </a-entity>
        </a-entity>
    </a-scene>

<script>
// LISTA COMPLETA RESTAURADA
const assets = [
    "Axe Stone.glb", "Bamboo medium.glb", "Bamboo-xBPj13w3JQ.glb", "Bamboo.glb", "Big Crystal.glb", 
    "Blank block.glb", "Brick block.glb", "Bush.glb", "Button.glb", "Cat.glb", "Cheese block.glb", 
    "Chest open.glb", "Chicken.glb", "Coal block.glb", "Crate.glb", "Crystal block.glb", "Crystal.glb", 
    "Cube Guy Character.glb", "Cubic Woman Character.glb", "Dead Tree-4E3IOActVF.glb", "Dead Tree-9dGXS7GrWc.glb", 
    "Dead Tree.glb", "Demon.glb", "Diamond Axe.glb", "Diamond block.glb", "Diamond Pickaxe.glb", 
    "Diamond Shovel.glb", "Dirt block.glb", "Dog.glb", "Fence Center.glb", "Fence Corner.glb", 
    "Fence End.glb", "Fence T.glb", "Flowers-0mxlGKYE9P.glb", "Flowers.glb", "Giant.glb", "Goblin.glb", 
    "Gold Axe.glb", "Gold Sword.glb", "Grass block.glb", "Grass small.glb", "Grass.glb", "Grey Bricks.glb", 
    "Hedgehog.glb", "Horse.glb", "Ice block.glb", "Key.glb", "Lever.glb", "Metal block.glb", "Metal door.glb", 
    "Mushroom.glb", "Pickaxe Gold.glb", "Pickaxe Wood.glb", "Pig.glb", "Plant-n31PjUy6Ra.glb", "Plant.glb", 
    "Raccoon.glb", "Rail Corner.glb", "Rail Incline.glb", "Rail Straight.glb", "Rock-Xx1Jkg77vJ.glb", 
    "Rock.glb", "Sheep.glb", "Shovel Gold.glb", "Skeleton.glb", "Snow block.glb", "Steve.glb", 
    "Stone block.glb", "Stone pickaxe.glb", "Stone shovel.glb", "Sword Diamond.glb", "Sword Stone.glb", 
    "Tree-ahBEW2RRgq.glb", "Tree-s8XdT4FOZz.glb", "Tree.glb", "Wolf.glb", "Wood Axe.glb", "Wood Chest.glb", 
    "Wood planks block.glb", "Wood shovel.glb", "Wood sword.glb", "Yeti.glb", "Zombie.glb", "vagoneta.glb"
];

let objetoVisto = null;

// Sistema de detección para borrado
document.getElementById('puntero').addEventListener('raycaster-intersection', (e) => { objetoVisto = e.detail.els[0]; });
document.getElementById('puntero').addEventListener('raycaster-intersection-cleared', () => { objetoVisto = null; });

window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'x' && objetoVisto) {
        objetoVisto.parentNode.removeChild(objetoVisto);
    }
});

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 text-center text-[9px] text-white border border-slate-700";
        d.innerHTML = `📦<br>${name.split('.')[0]}`;
        d.onclick = () => spawn(name);
        l.appendChild(d);
    });
}

function spawn(name) {
    const camera = document.getElementById('camera');
    const world = document.getElementById('contenedor-mundo');
    const entity = document.createElement('a-entity');
    
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    
    // El objeto nace donde estás mirando
    camera.appendChild(entity);
    entity.setAttribute('position', '0 -0.5 -3');
    
    setTimeout(() => {
        const p = new THREE.Vector3();
        entity.object3D.getWorldPosition(p);
        const r = new THREE.Quaternion();
        entity.object3D.getWorldQuaternion(r);
        
        world.appendChild(entity);
        entity.object3D.position.copy(p);
        entity.object3D.quaternion.copy(r);
        
        // Escala automática para que las flores no sean gigantes
        const lowName = name.toLowerCase();
        if(lowName.includes("flower") || lowName.includes("grass") || lowName.includes("plant") || lowName.includes("mushroom")) {
            entity.setAttribute('scale', '0.2 0.2 0.2');
        } else {
            entity.setAttribute('scale', '1 1 1');
        }
    }, 50);

    toggleMenu();
}

function descargarMundo() {
    const contenido = document.getElementById('contenedor-mundo').innerHTML;
    const html = `<html><head><script src="https://aframe.io/releases/1.4.2/aframe.min.js"><\/script></head><body><a-scene><a-sky color="#050505"></a-sky><a-grid></a-grid>${contenido}</a-scene></body></html>`;
    const blob = new Blob([html], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mi_mundo_guardado.html';
    a.click();
}
</script>
</body>
</html>
