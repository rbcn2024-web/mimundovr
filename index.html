<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editor PC - Puntero Libre</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .ui-panel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { background: #1e293b; color: white; padding: 12px; border-radius: 8px; border: 2px solid #3b82f6; cursor: pointer; }
        .menu { position: fixed; bottom: 80px; left: 20px; width: 300px; height: 400px; background: rgba(15, 23, 42, 0.9); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button class="btn" onclick="toggleMenu()">LIBRARY</button>
    </div>

    <div id="menu" class="menu">
        <div id="list" class="grid grid-cols-2 gap-2 text-white text-[10px]"></div>
    </div>

    <a-scene raycaster="objects: .interactable; far: 100" cursor="rayOrigin: mouse">
        
        <a-sky color="#111"></a-sky>
        <a-grid opacity="0.2"></a-grid>

        <a-entity id="world"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="2 4 -3"></a-light>

        <a-entity id="rig" position="0 0 5">
            <a-entity camera look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 100;"></a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Big Crystal.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Dead Tree.glb", "Zombie.glb"];

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 border border-white/10";
        d.innerHTML = `📦<br>${name}`;
        d.onclick = () => spawn(name);
        l.appendChild(d);
    });
}

function spawn(name) {
    const w = document.getElementById('world');
    const entity = document.createElement('a-entity');
    
    // Lo ponemos en el centro de la escena
    entity.setAttribute('position', {x: (Math.random()-0.5)*4, y: 0, z: 0});
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    entity.setAttribute('scale', '1 1 1');

    // EVENTO DE CLIC CON EL RATÓN
    entity.addEventListener('click', function() {
        // Feedback visual: al hacer clic el objeto se ilumina o sube
        console.log("Clic en: " + name);
        this.setAttribute('position', {
            x: this.object3D.position.x, 
            y: this.object3D.position.y + 0.5, 
            z: this.object3D.position.z
        });
    });

    w.appendChild(entity);
    toggleMenu();
}
</script>
</body>
</html>
