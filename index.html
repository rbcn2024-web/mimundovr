
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editor WebXR - Renoverso 6.0</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-exporter-component@1.0.1/dist/aframe-exporter-component.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div style="position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 10000;">
        <button onclick="toggleMenu()" style="background: #1e293b; color: white; padding: 12px; border-radius: 8px; border: 2px solid #3b82f6; cursor: pointer;">LIBRERÍA</button>
        <button onclick="exportar()" style="background: #1e293b; color: #22c55e; padding: 12px; border-radius: 8px; border: 2px solid #22c55e; cursor: pointer;">GUARDAR ESCENA</button>
    </div>

    <div id="asset-menu" style="position: fixed; bottom: 85px; left: 20px; width: 300px; height: 400px; background: rgba(15, 23, 42, 0.95); border-radius: 15px; padding: 15px; display: none; flex-direction: column; z-index: 10001; border: 2px solid #3b82f6; overflow-y: auto;">
        <div id="list-container" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene id="escena" gltf-exporter renderer="colorManagement: true;">
        <a-sky color="#111"></a-sky>
        <a-grid opacity="0.1"></a-grid>
        
        <a-entity id="world-container"></a-entity>
        
        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="3 10 5"></a-light>

        <a-entity id="rig" movement-controls="speed: 0.2;">
            <a-entity id="camera" camera position="0 1.6 0" look-controls>
                <a-cursor id="mouse-cursor" raycaster="objects: .interactable" color="#3b82f6"></a-cursor>
            </a-entity>
            
            <a-entity laser-controls="hand: right" raycaster="objects: .interactable; far: 50" line="color: #22c55e; opacity: 0.7"></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Big Crystal.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Chicken.glb", "Crate.glb", "Dead Tree.glb", "Dog.glb", "Flowers.glb", "Grass.glb", "Mushroom.glb", "Pig.glb", "Rock.glb", "Steve.glb", "Zombie.glb", "vagoneta.glb"];

function renderMenu() {
    const container = document.getElementById('list-container');
    container.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.style.cssText = "background: #1e293b; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; font-size: 10px; border: 1px solid #334155;";
        d.innerHTML = `📦<br>${name}`;
        d.onclick = () => spawn(name);
        container.appendChild(d);
    });
}

function spawn(fileName) {
    const world = document.getElementById('world-container');
    const camPos = document.getElementById('camera').object3D.position;
    
    const entity = document.createElement('a-entity');
    // Aparece a la altura de tus manos y un poco adelantado
    entity.setAttribute('position', {x: camPos.x, y: 1.2, z: camPos.z - 2});
    
    // IMPORTANTE: Añadimos clase interactable y un componente de escucha
    entity.setAttribute('class', 'interactable');
    
    // Cargamos el modelo
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${fileName})`);
    
    // Escala inicial
    entity.setAttribute('scale', '1 1 1');

    // Lógica de "Click/Grip" básica: al tocarlo, se mueve un poco (test de selección)
    entity.addEventListener('mouseenter', () => {
        entity.setAttribute('scale', '1.1 1.1 1.1'); // Feedback visual al apuntar
    });
    entity.addEventListener('mouseleave', () => {
        entity.setAttribute('scale', '1 1 1');
    });

    world.appendChild(entity);
    toggleMenu();
}

function toggleMenu() {
    const m = document.getElementById('asset-menu');
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    if(m.style.display === 'flex') renderMenu();
}

function exportar() {
    document.querySelector('a-scene').components['gltf-exporter'].export();
}
</script>
</body>
</html>
