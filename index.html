<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Renoverso - Navegación Pro</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // Gizmo visual al seleccionar
        AFRAME.registerComponent('selectable', {
            init: function () {
                this.el.addEventListener('click', (e) => {
                    document.querySelectorAll('.gizmo').forEach(el => el.parentNode.removeChild(el));
                    const gizmo = document.createElement('a-box');
                    gizmo.setAttribute('class', 'gizmo');
                    gizmo.setAttribute('wireframe', true);
                    gizmo.setAttribute('color', '#00ecff');
                    gizmo.setAttribute('scale', '1.1 1.1 1.1');
                    this.el.appendChild(gizmo);
                });
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-panel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { background: #0f172a; color: white; padding: 12px 20px; border-radius: 8px; border: 2px solid #3b82f6; cursor: pointer; font-weight: bold; font-family: sans-serif; }
        .menu { position: fixed; bottom: 85px; left: 20px; width: 320px; height: 450px; background: rgba(15, 23, 42, 0.95); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; border-radius: 15px; }
        .hint { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: #3b82f6; padding: 15px; border-radius: 8px; font-size: 12px; z-index: 1000; border-left: 4px solid #3b82f6; font-family: monospace; }
    </style>
</head>
<body>

    <div class="hint">
        <b>GUÍA DE MOVIMIENTO:</b><br>
        • ADELANTE/ATRÁS: Teclas <b>W / S</b> o <b>↑ / ↓</b><br>
        • LADOS: Teclas <b>A / D</b> o <b>← / →</b><br>
        • VOLAR: Tecla <b>Q</b> (Subir) / <b>E</b> (Bajar)<br>
        • MIRAR: Arrastra con el <b>Ratón</b>
    </div>

    <div class="ui-panel">
        <button class="btn" onclick="toggleMenu()">📦 ASSETS</button>
        <button class="btn" onclick="exportar()" style="border-color:#22c55e; color:#22c55e;">💾 GUARDAR</button>
    </div>

    <div id="menu" class="menu">
        <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene raycaster="objects: .interactable" cursor="rayOrigin: mouse" shadow="type: pcfsoft">
        
        <a-sky color="#050505"></a-sky>
        <a-grid position="0 0 0" cellColor="#222" sectionColor="#3b82f6" opacity="0.4"></a-grid>

        <a-entity id="world-container"></a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="5 10 7" intensity="1" castShadow="true"></a-light>

        <a-entity id="rig" movement-controls="controls: keyboard; speed: 0.3; fly: true">
            <a-entity camera 
                      position="0 1.6 5" 
                      look-controls="pointerLockEnabled: false"
                      wasd-controls="acceleration: 120">
            </a-entity>
        </a-entity>

    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Big Crystal.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Dead Tree.glb", "Flowers.glb", "Grass.glb", "Zombie.glb", "Steve.glb", "vagoneta.glb"];

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-3 rounded-lg cursor-pointer hover:bg-blue-600 border border-white/5 text-center text-[10px]";
        d.innerHTML = `📦<br>${name.split('.')[0]}`;
        d.onclick = (e) => { e.stopPropagation(); spawn(name); };
        l.appendChild(d);
    });
}

function spawn(name) {
    const w = document.getElementById('world-container');
    const entity = document.createElement('a-entity');
    
    // Lo genera justo delante de donde estés mirando
    entity.setAttribute('position', "0 0 -3");
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    entity.setAttribute('selectable', ''); 

    // Corrección de escala para vegetación
    if(name.includes("Flowers") || name.includes("Grass") || name.includes("Bamboo")) {
        entity.setAttribute('scale', '0.2 0.2 0.2');
    } else {
        entity.setAttribute('scale', '1 1 1');
    }

    w.appendChild(entity);
    toggleMenu();
}

function exportar() {
    document.querySelector('a-scene').components['gltf-exporter'].export();
}
</script>
</body>
</html>
