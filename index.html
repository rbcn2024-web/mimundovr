<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Renoverso - Quinta Generación</title>
    <meta name="description" content="Metaverso Soberano">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="skyTexture" src="skyboxrenoverso1.jpg">

        <a-asset-item id="gel1" src="1/1.glb"></a-asset-item>
        <a-asset-item id="gel107" src="2/107.glb"></a-asset-item>
      </a-assets>

      <a-sky src="#skyTexture"></a-sky>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" opacity="0.1"></a-plane>

      <a-entity gltf-model="#gel1" position="-2 1.5 -5" scale="1 1 1"></a-entity>
      <a-entity gltf-model="#gel107" position="2 1.5 -5" scale="1 1 1"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
