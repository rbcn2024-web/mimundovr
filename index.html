<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Rafael - Seguimiento Real</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div style="position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; z-index: 1000; font-family: monospace; border: 1px solid #3b82f6;">
        <b>CONTROLES DE ASSET:</b><br>
        Mover objeto: <b>I / K / J / L</b><br>
        Subir/Bajar: <b>U / O</b><br>
        Escalar (+/-): <b>Y / H</b>
    </div>

    <div style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button onclick="toggleMenu()" style="background: #1e293b; color: white; padding: 12px; border: 2px solid #3b82f6; cursor: pointer; border-radius: 8px;">BIBLIOTECA</button>
        <button onclick="exportar()" style="background: #1e293b; color: #22c55e; padding: 12px; border: 2px solid #22c55e; cursor: pointer; border-radius: 8px;">GUARDAR ESCENA</button>
    </div>

    <div id="menu" style="position: fixed; bottom: 85px; left: 20px; width: 350px; height: 450px; background: rgba(15, 23, 42, 0.98); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; border-radius: 15px;">
        <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene>
        <a-sky color="#050505"></a-sky>
        <a-grid opacity="0.2"></a-grid>
        <a-entity id="world"></a-entity>

        <a-entity id="rig" movement-controls="fly: true; speed: 0.3">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 100;"></a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Big Crystal.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Dead Tree.glb", "Flowers.glb", "Grass.glb", "Zombie.glb", "Steve.glb", "vagoneta.glb"];
let lastSpawned = null;

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 text-center text-[10px]";
        d.innerHTML = `📦<br>${name}`;
        d.onclick = () => spawn(name);
        l.appendChild(d);
    });
}

function spawn(name) {
    const world = document.getElementById('world');
    const camera = document.getElementById('camera');
    
    // FORZAR ACTUALIZACIÓN DE COORDENADAS DEL MUNDO
    camera.object3D.updateMatrixWorld();
    const worldPos = new THREE.Vector3();
    camera.object3D.getWorldPosition(worldPos);
    
    // Obtener la dirección hacia donde miras
    const direction = new THREE.Vector3();
    camera.object3D.getWorldDirection(direction);

    const entity = document.createElement('a-entity');
    
    // Colocar exactamente 2 metros delante de tu cara actual
    entity.setAttribute('position', {
        x: worldPos.x - (direction.x * 2),
        y: worldPos.y - (direction.y * 2) - 0.5,
        z: worldPos.z - (direction.z * 2)
    });
    
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    
    // Ajustar escala para que no sean gigantes
    if(name.match(/flower|grass|bamboo/i)) {
        entity.setAttribute('scale', '0.2 0.2 0.2');
    } else {
        entity.setAttribute('scale', '1 1 1');
    }

    world.appendChild(entity);
    lastSpawned = entity; // Guardamos referencia para moverlo con teclado
    toggleMenu();
}

// CONTROL DE MOVIMIENTO DEL OBJETO CON TECLADO
window.addEventListener('keydown', (e) => {
    if (!lastSpawned) return;
    let pos = lastSpawned.getAttribute('position');
    let sca = lastSpawned.getAttribute('scale');
    const step = 0.1;

    switch(e.key.toLowerCase()) {
        case 'i': pos.z -= step; break;
        case 'k': pos.z += step; break;
        case 'j': pos.x -= step; break;
        case 'l': pos.x += step; break;
        case 'u': pos.y += step; break;
        case 'o': pos.y -= step; break;
        case 'y': // Escalar más grande
            lastSpawned.setAttribute('scale', {x: sca.x + 0.05, y: sca.y + 0.05, z: sca.z + 0.05});
            break;
        case 'h': // Escalar más pequeño
            lastSpawned.setAttribute('scale', {x: sca.x - 0.05, y: sca.y - 0.05, z: sca.z - 0.05});
            break;
    }
    lastSpawned.setAttribute('position', pos);
});

function exportar() {
    alert("Escena guardada en consola (lógica de exportación activa)");
    console.log(document.getElementById('world').innerHTML);
}
</script>
</body>
</html>
