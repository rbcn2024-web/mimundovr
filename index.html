<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editor WebXR - Renoverso PRO</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-exporter-component@1.0.1/dist/aframe-exporter-component.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-panel { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 10000; }
        .btn-mini { background: #1e293b; color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: 2px solid #3b82f6; cursor: pointer; font-size: 12px; }
        .asset-menu { position: fixed; bottom: 85px; left: 20px; width: 320px; height: 500px; background: rgba(15, 23, 42, 0.98); border-radius: 15px; padding: 15px; display: none; flex-direction: column; z-index: 10001; border: 2px solid #3b82f6; }
        .scroll-v { overflow-y: auto !important; height: 100%; margin-top: 10px; }
        .scroll-v::-webkit-scrollbar { width: 6px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button onclick="toggleMenu()" class="btn-mini">ASSETS</button>
        <button onclick="exportar()" class="btn-mini" style="border-color:#22c55e; color:#22c55e;">SAVE .GLB</button>
    </div>

    <div id="asset-menu" class="asset-menu">
        <div class="flex justify-between items-center border-b border-gray-700 pb-2 text-white">
            <span class="font-bold text-xs uppercase">VR LIBRARY</span>
            <button onclick="toggleMenu()" class="text-xl">✕</button>
        </div>
        <div class="scroll-v">
            <div id="list-container" class="grid grid-cols-2 gap-2 text-white pb-10"></div>
        </div>
    </div>

    <a-scene id="escena" gltf-exporter renderer="colorManagement: true; antialias: true;">
        <a-sky color="#050505"></a-sky>
        <a-grid limits="50" cellColor="#ffffff" sectionColor="#3b82f6" sectionSize="10" opacity="0.2"></a-grid>
        <a-entity id="world-container"></a-entity>
        
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="3 10 5" intensity="1"></a-light>

        <a-entity id="rig" position="0 0 0">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 65;">
                <a-cursor color="#3b82f6" radius="0.01"></a-cursor>
            </a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right" raycaster="objects: .interactable" line="color: #22c55e;"></a-entity>
        </a-entity>
    </a-scene>

<script>
// LISTA REAL EXTRAÍDA DE TU REPOSITORIO (rbcn2024-web/mimundovr/mi-metaverso2)
const assets = [
    "Axe Stone.glb", "Bamboo medium.glb", "Bamboo-xBPj13w3JQ.glb", "Bamboo.glb", "Big Crystal.glb", 
    "Blank block.glb", "Brick block.glb", "Bush.glb", "Button.glb", "Cat.glb", "Cheese block.glb", 
    "Chest open.glb", "Chicken.glb", "Coal block.glb", "Crate.glb", "Crystal block.glb", "Crystal.glb", 
    "Cube Guy Character.glb", "Cubic Woman Character.glb", "Dead Tree-4E3IOActVF.glb", 
    "Dead Tree-9dGXS7GrWc.glb", "Dead Tree.glb", "Demon.glb", "Diamond Axe.glb", "Diamond block.glb", 
    "Diamond Pickaxe.glb", "Diamond Shovel.glb", "Dirt block.glb", "Dog.glb", "Fence Center.glb", 
    "Fence Corner.glb", "Fence End.glb", "Fence T.glb", "Flowers-0mxlGKYE9P.glb", "Flowers.glb", 
    "Giant.glb", "Goblin.glb", "Gold Axe.glb", "Gold Sword.glb", "Grass block.glb", "Grass small.glb", 
    "Grass.glb", "Grey Bricks.glb", "Hedgehog.glb", "Horse.glb", "Ice block.glb", "Key.glb", "Lever.glb", 
    "Metal block.glb", "Metal door.glb", "Mushroom.glb", "Pickaxe Gold.glb", "Pickaxe Wood.glb", 
    "Pig.glb", "Plant-n31PjUy6Ra.glb", "Plant.glb", "Raccoon.glb", "Rail Corner.glb", "Rail Incline.glb", 
    "Rail Straight.glb", "Rock-Xx1Jkg77vJ.glb", "Rock.glb", "Sheep.glb", "Shovel Gold.glb", "Skeleton.glb", 
    "Snow block.glb", "Steve.glb", "Stone block.glb", "Stone pickaxe.glb", "Stone shovel.glb", 
    "Sword Diamond.glb", "Sword Stone.glb", "Tree-ahBEW2RRgq.glb", "Tree-s8XdT4FOZz.glb", "Tree.glb", 
    "Wolf.glb", "Wood Axe.glb", "Wood Chest.glb", "Wood planks block.glb", "Wood shovel.glb", 
    "Wood sword.glb", "Yeti.glb", "Zombie.glb", "vagoneta.glb"
];

const carpeta = "mi-metaverso2";

function renderMenu() {
    const container = document.getElementById('list-container');
    container.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded text-[9px] text-center cursor-pointer hover:bg-blue-600 border border-white/5";
        d.innerHTML = `<div class='text-xl mb-1'>📦</div>${name.replace('.glb','')}`;
        d.onclick = () => spawn(name);
        container.appendChild(d);
    });
}

function spawn(fileName) {
    const world = document.getElementById('world-container');
    const rigPos = document.getElementById('camera').object3D.position;
    
    const entity = document.createElement('a-entity');
    entity.setAttribute('position', {x: rigPos.x, y: 1.0, z: rigPos.z - 2.5});
    
    const modelo = document.createElement('a-entity');
    const ruta = carpeta + "/" + fileName;
    
    modelo.setAttribute('gltf-model', 'url(' + ruta + ')');
    modelo.setAttribute('class', 'interactable');
    modelo.setAttribute('scale', '1 1 1');
    
    entity.appendChild(modelo);
    world.appendChild(entity);
    console.log("Loading Asset: " + ruta);
}

function toggleMenu() {
    const m = document.getElementById('asset-menu');
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    if(m.style.display === 'flex') renderMenu();
}

function exportar() {
    document.querySelector('a-scene').components['gltf-exporter'].export();
}

document.querySelector('a-scene').addEventListener('mousedown', function () {
    if (this.canvas) this.canvas.requestPointerLock();
});
</script>
</body>
</html>
