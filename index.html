<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Renoverso - Conexión Real</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene inspector="url: https://cdn.jsdelivr.net/gh/aframevr/aframe-inspector@master/dist/aframe-inspector.min.js">
      
      <a-assets>
        <img id="sky" src="https://raw.githubusercontent.com/rbcn2024/rbcn2024-web/main/skyboxrenoverso1.jpg">

        <a-asset-item id="g1" src="https://raw.githubusercontent.com/rbcn2024/rbcn2024-web/main/1/1.glb"></a-asset-item>
        <a-asset-item id="g2" src="https://raw.githubusercontent.com/rbcn2024/rbcn2024-web/main/1/2.glb"></a-asset-item>
        <a-asset-item id="g50" src="https://raw.githubusercontent.com/rbcn2024/rbcn2024-web/main/1/50.glb"></a-asset-item>

        <a-asset-item id="g107" src="https://raw.githubusercontent.com/rbcn2024/rbcn2024-web/main/2/107.glb"></a-asset-item>
        <a-asset-item id="g191" src="https://raw.githubusercontent.com/rbcn2024/rbcn2024-web/main/2/191.glb"></a-asset-item>
      </a-assets>

      <a-sky src="#sky"></a-sky>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.5" position="-1 2 1"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
