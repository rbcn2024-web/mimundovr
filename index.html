<!DOCTYPE html>
<html>
  <head>
    <title>Metaverso 5G - Hub Central</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
  </head>
  
  <body>
    <a-scene inspector="url: https://cdn.jsdelivr.net/gh/aframevr/aframe-inspector@master/dist/aframe-inspector.min.js">
      
      <a-sky color="#050505"></a-sky>

      <a-grid static-body material="opacity: 0.2; transparent: true; color: #3b82f6"></a-grid>

      <a-entity id="portal-luna" 
                geometry="primitive: sphere; radius: 1" 
                material="color: #888888; emissive: #444444" 
                position="-3 1.5 -5">
      </a-entity>

      <a-entity id="portal-egipto" 
                geometry="primitive: tetrahedron; radius: 1.2" 
                material="color: #d4af37; emissive: #221a00" 
                position="0 1.5 -5">
      </a-entity>

      <a-entity id="portal-ia" 
                geometry="primitive: box; width: 1.5; height: 1.5; depth: 1.5" 
                material="color: #00f2ff; emissive: #004455; opacity: 0.8; transparent: true" 
                position="3 1.5 -5">
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    </a-scene>
  </body>
</html>
