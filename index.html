<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Editor de Metaversos XR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script src="https://unpkg.com/aframe-inspector@1.6.0/dist/aframe-inspector.min.js"></script>
    
    <script>
      function subirAsset() {
        console.log("Aquí conectarías tu base de datos de metaversos");
        alert("Función para subir sets lista para programar.");
      }
    </script>
    <style>
      #UI-Capa {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 9999;
      }
      button {
        padding: 10px;
        background: #242424;
        color: white;
        border: 1px solid #ff00ff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="UI-Capa">
      <button onclick="subirAsset()">SUBIR NUEVO SET</button>
    </div>

    <a-scene inspector="url: https://unpkg.com/aframe-inspector@1.6.0/dist/aframe-inspector.min.js">
      
      <a-assets>
        <img id="suelo-textura" src="https://i.imgur.com/mYmmbrp.jpg">
      </a-assets>

      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" src="#suelo-textura"></a-plane>
      <a-sky color="#ECECEC"></a-sky>

      <a-entity cursor="rayOrigin: mouse"></a-entity>
    </a-scene>

  </body>
</html>
