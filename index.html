<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Renoverso Assets</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="texturaLuna" src="mi-metaverso2/luna.jpg">
        <img id="texturaEgipto" src="mi-metaverso2/egipto.jpg">
        <img id="texturaIA" src="mi-metaverso2/ia.jpg">
      </a-assets>

      <a-sky src="skyboxrenoverso1.jpg" rotation="0 -90 0"></a-sky>

      <a-sphere position="-3 1.5 -5" radius="1.2" src="#texturaLuna"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
      </a-sphere>

      <a-cone position="0 1.2 -7" radius-bottom="1.5" height="2" src="#texturaEgipto">
      </a-cone>

      <a-torus-knot position="3 1.5 -5" radius="0.8" radius-tubular="0.1" src="#texturaIA"
                    animation="property: rotation; to: 360 360 0; loop: true; dur: 15000">
      </a-torus-knot>

      <a-light type="ambient" color="#FFF"></a-light>
    </a-scene>
  </body>
</html>
