
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Rafael - Suelo y Borrado</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div style="position: fixed; top: 20px; left: 20px; background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; border-radius: 10px; z-index: 1000; font-family: sans-serif; border: 2px solid #3b82f6; font-size: 12px;">
        <b style="color: #3b82f6;">GUÍA RÁPIDA:</b><br>
        • <b>WASD / Flechas</b>: Caminar por el suelo.<br>
        • <b>Mirar + X</b>: Borrar el objeto apuntado.<br>
        • <b>Mirar + F</b>: Alejar el objeto (empujar).<br>
        • <b>Q / E</b>: Volar / Bajar.
    </div>

    <div style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button onclick="toggleMenu()" style="background: #1e293b; color: white; padding: 12px; border: 2px solid #3b82f6; border-radius: 8px; cursor: pointer; font-weight: bold;">LIBRERÍA</button>
        <button onclick="descargarMundo()" style="background: #064e3b; color: #10b981; padding: 12px; border: 2px solid #10b981; border-radius: 8px; cursor: pointer; font-weight: bold;">GUARDAR</button>
    </div>

    <div id="menu" style="position: fixed; bottom: 85px; left: 20px; width: 300px; height: 400px; background: rgba(15, 23, 42, 0.98); border: 2px solid #3b82f6; display: none; overflow-y: auto; padding: 15px; z-index: 1001; border-radius: 15px;">
        <div id="list" class="grid grid-cols-2 gap-2 text-white"></div>
    </div>

    <a-scene id="escena">
        <a-sky color="#050505"></a-sky>
        
        <a-grid position="0 0 0" rotation="-90 0 0" width="1000" height="1000" static-body></a-grid>
        
        <a-entity id="contenedor-mundo"></a-entity>

        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="2 4 3"></a-light>

        <a-entity id="rig" position="0 0 5">
            <a-entity id="camera" camera look-controls wasd-controls="acceleration: 100">
                <a-cursor id="puntero" raycaster="objects: .interactable" color="#3b82f6"></a-cursor>
            </a-entity>
        </a-entity>
    </a-scene>

<script>
const assets = ["Axe Stone.glb", "Bamboo.glb", "Brick block.glb", "Bush.glb", "Chest open.glb", "Crate.glb", "Flowers.glb", "Grass.glb", "Steve.glb", "Zombie.glb", "vagoneta.glb"];
let objetoVisto = null;

// Detectar qué miramos
document.getElementById('puntero').addEventListener('raycaster-intersection', (e) => { objetoVisto = e.detail.els[0]; });
document.getElementById('puntero').addEventListener('raycaster-intersection-cleared', () => { objetoVisto = null; });

// Teclas de acción
window.addEventListener('keydown', (e) => {
    if (!objetoVisto) return;
    
    // X para Borrar
    if (e.key.toLowerCase() === 'x') {
        objetoVisto.parentNode.removeChild(objetoVisto);
    }
    
    // F para Alejar/Empujar el objeto
    if (e.key.toLowerCase() === 'f') {
        let p = objetoVisto.getAttribute('position');
        objetoVisto.setAttribute('position', {x: p.x, y: p.y, z: p.z - 0.5});
    }
});

function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    if(m.style.display === 'block') render();
}

function render() {
    const l = document.getElementById('list');
    l.innerHTML = "";
    assets.forEach(name => {
        const d = document.createElement('div');
        d.className = "bg-slate-800 p-2 rounded cursor-pointer hover:bg-blue-600 text-center text-[10px] text-white border border-slate-700";
        d.innerHTML = `📦<br>${name}`;
        d.onclick = () => spawn(name);
        l.appendChild(d);
    });
}

function spawn(name) {
    const camera = document.getElementById('camera');
    const world = document.getElementById('contenedor-mundo');
    const entity = document.createElement('a-entity');
    
    entity.setAttribute('gltf-model', `url(mi-metaverso2/${name})`);
    entity.setAttribute('class', 'interactable');
    
    // 1. Pegar a la cámara para heredar posición
    camera.appendChild(entity);
    entity.setAttribute('position', '0 -0.5 -2.5'); // Un poco lejos para ver bien
    
    // 2. Soltar en el mundo
    setTimeout(() => {
        const p = new THREE.Vector3();
        entity.object3D.getWorldPosition(p);
        const r = new THREE.Quaternion();
        entity.object3D.getWorldQuaternion(r);
        
        world.appendChild(entity);
        entity.object3D.position.copy(p);
        entity.object3D.quaternion.copy(r);
        
        if(name.match(/flower|grass|bamboo/i)) entity.setAttribute('scale', '0.2 0.2 0.2');
    }, 20);

    toggleMenu();
}

function descargarMundo() {
    const html = `<html><head><script src="https://aframe.io/releases/1.4.2/aframe.min.js"><\/script></head><body><a-scene><a-sky color="#050505"></a-sky><a-grid></a-grid>${document.getElementById('contenedor-mundo').innerHTML}</a-scene></body></html>`;
    const blob = new Blob([html], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mi_metaverso.html';
    a.click();
}
</script>
</body>
</html>
