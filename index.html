<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor WebXR Profesional - Full Scroll</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-exporter-component@1.0.1/dist/aframe-exporter-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/clarafu/aframe-transformation-controls@master/dist/aframe-transformation-controls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Panel de botones */
        .ui-panel { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 10000; pointer-events: none; }
        .btn-mini { 
            pointer-events: auto; background: #1e293b; color: white; padding: 10px 18px; 
            border-radius: 8px; font-weight: bold; font-size: 12px; border: 2px solid #3b82f6; 
            cursor: pointer; text-transform: uppercase;
        }
        .btn-save { border-color: #22c55e; color: #22c55e; }

        /* EL MENÚ CON SCROLL CORREGIDO */
        .asset-menu { 
            position: fixed; bottom: 85px; left: 20px; width: 300px; height: 420px; 
            background: rgba(15, 23, 42, 0.98); border-radius: 15px; padding: 15px;
            display: none; flex-direction: column; z-index: 10001; border: 2px solid #3b82f6;
        }

        /* Contenedor de SCROLL (Esto es lo que necesitabas) */
        .scroll-v { 
            overflow-y: scroll !important; /* Scroll vertical siempre activo */
            height: 100%;
            margin-top: 10px;
            padding-right: 5px;
        }

        /* Diseño de la barra de scroll para que se vea siempre */
        .scroll-v::-webkit-scrollbar { width: 12px; display: block; }
        .scroll-v::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; border: 2px solid #0f172a; }

        /* Asegurar que el canvas ocupe todo */
        a-scene { width: 100%; height: 100vh; }
    </style>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <div class="ui-panel">
        <button onclick="toggleMenu()" class="btn-mini">Assets</button>
        <button onclick="exportar()" class="btn-mini btn-save">Guardar</button>
    </div>

    <div id="asset-menu" class="asset-menu">
        <div class="flex justify-between items-center border-b border-gray-700 pb-2 text-white">
            <span id="nav-title" class="font-bold text-xs uppercase tracking-tighter">Librería de Objetos</span>
            <button onclick="toggleMenu()" class="text-xl">✕</button>
        </div>
        <button id="back-btn" onclick="renderRaiz()" class="hidden w-full bg-blue-900/60 text-blue-100 text-[10px] py-2 my-2 rounded border border-blue-500">⬅ VOLVER</button>
        
        <div class="scroll-v">
            <div id="list-container" class="grid grid-cols-2 gap-3 text-white pb-10">
                </div>
        </div>
    </div>

    <a-scene id="escena" gltf-exporter vr-mode-ui="enabled: true" renderer="colorManagement: true;">
        
        <a-sky color="#050505"></a-sky>
        
        <a-grid 
            limits="50" 
            cell-color="#ffffff" 
            section-color="#3b82f6" 
            section-size="10" 
            opacity="0.5">
        </a-grid>

        <a-entity id="world-container"></a-entity>

        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="2 4 3" intensity="0.8"></a-light>

        <a-entity id="rig" movement-controls="speed: 0.3; fly: false">
            <a-entity camera 
                      position="0 1.6 0" 
                      look-controls="pointerLockEnabled: true" 
                      wasd-controls="acceleration: 65;">
            </a-entity>
            
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right" raycaster="objects: .interactable, .transformer-handle" line="color: #3b82f6; opacity: 0.8"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        /* IMPORTANTE: Escribe aquí los nombres de tus archivos .glb reales */
        const biblioteca = {
            "mi-metaverso-1": ["modelo1", "modelo2", "pino", "roca", "casa", "suelo", "valla", "fuente"], 
            "mi-metaverso-2": ["objetoA", "objetoB", "nave", "robot", "laser", "puerta", "ventana"]
        };

        function toggleMenu() {
            const m = document.getElementById('asset-menu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            if(m.style.display === 'flex') renderRaiz();
        }

        function renderRaiz() {
            const c = document.getElementById('list-container');
            const b = document.getElementById('back-btn');
            const t = document.getElementById('nav-title');
            c.innerHTML = ""; b.classList.add('hidden'); t.innerText = "CATEGORÍAS";
            
            Object.keys(biblioteca).forEach(cat => {
                const d = document.createElement('div');
                d.className = "bg-gray-800 p-5 rounded-xl text-[10px] text-center cursor-pointer hover:bg-blue-600 border border-blue-900 transition";
                d.innerHTML = `<div class='text-3xl mb-2'>📁</div>${cat}`;
                d.onclick = () => renderSub(cat);
                c.appendChild(d);
            });
        }

        function renderSub(cat) {
            const c = document.getElementById('list-container');
            const b = document.getElementById('back-btn');
            const t = document.getElementById('nav-title');
            c.innerHTML = ""; b.classList.remove('hidden'); t.innerText = cat;
            
            biblioteca[cat].forEach(item => {
                const d = document.createElement('div');
                d.className = "bg-slate-800 p-3 rounded-lg text-[9px] text-center cursor-pointer hover:bg-green-700 border border-white/10 transition";
                d.innerHTML = `<div class='text-2xl mb-1'>📦</div>${item}`;
                d.onclick = () => spawn(cat, item);
                c.appendChild(d);
            });
        }

        function spawn(cat, name) {
            const world = document.getElementById('world-container');
            const rig = document.getElementById('rig').getAttribute('position');
            const entity = document.createElement('a-entity');
            
            // Spawn frente al usuario
            entity.setAttribute('position', `${rig.x} 0.2 ${rig.z - 3}`);
            
            // GIZMOS ACTIVOS PARA MOVER ARRIBA/ABAJO/LADOS
            entity.setAttribute('transformation-controls', { type: 'translate' });

            const model = document.createElement('a-entity');
            // Ruta: mi-metaverso-1/archivo.glb
            const ruta = `${cat}/${name.toLowerCase()}.glb`;
            model.setAttribute('gltf-model', `url(${ruta})`);
            model.setAttribute('class', 'interactable');
            
            entity.appendChild(model);
            world.appendChild(entity);
            console.log("Cargado: " + ruta);
        }

        function exportar() {
            const scene = document.querySelector('a-scene');
            document.querySelectorAll('#world-container > a-entity').forEach(el => el.object3D.updateMatrixWorld());
            scene.components['gltf-exporter'].export();
            alert("Exportando escena...");
        }

        // Fix para movimiento en PC
        document.querySelector('a-scene').addEventListener('mousedown', function () {
            this.canvas.requestPointerLock();
        });
    </script>
</body>
</html>
